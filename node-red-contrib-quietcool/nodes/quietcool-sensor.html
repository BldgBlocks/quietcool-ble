<script type="text/html" data-template-name="quietcool-sensor">
    <div class="form-row">
        <label for="node-input-fan"><i class="fa fa-bluetooth"></i> Fan</label>
        <input type="text" id="node-input-fan">
    </div>
    <div class="form-row">
        <label for="node-input-query"><i class="fa fa-search"></i> Query</label>
        <select id="node-input-query" style="width:70%;">
            <option value="get_state">State (temp, humidity, mode, speed)</option>
            <option value="get_status">Full Status</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
</script>

<script type="text/html" data-help-name="quietcool-sensor">
    <p>Reads sensor data and status from a QuietCool whole house fan.
    Wire an <b>inject</b> node to trigger reads as needed.</p>

    <h3>Queries</h3>
    <dl>
        <dt>State</dt>
        <dd>Current mode, speed, temperature (&deg;F), humidity (%).</dd>
        <dt>Full Status</dt>
        <dd>Complete status including fan info, firmware, presets, thresholds, and timer.</dd>
    </dl>

    <h3>Output — State</h3>
    <dl>
        <dt><code>msg.topic</code> <span class="property-type">string</span></dt>
        <dd><code>"state"</code></dd>
        <dt><code>msg.state</code> <span class="property-type">object</span></dt>
        <dd>{ mode, range, temperature, humidity, sensorState }</dd>
    </dl>

    <h3>Output — Full Status</h3>
    <dl>
        <dt><code>msg.topic</code> <span class="property-type">string</span></dt>
        <dd><code>"full"</code></dd>
        <dt><code>msg.state</code> <span class="property-type">object</span></dt>
        <dd>{ mode, range, temperature, humidity, sensorState }</dd>
        <dt><code>msg.info</code> <span class="property-type">object</span></dt>
        <dd>{ name, model, serial, connected }</dd>
        <dt><code>msg.version</code> <span class="property-type">object</span></dt>
        <dd>{ firmware, hardware }</dd>
        <dt><code>msg.params</code> <span class="property-type">object</span></dt>
        <dd>{ fanType, thresholds }</dd>
        <dt><code>msg.presets</code> <span class="property-type">object</span></dt>
        <dd>{ list, active }</dd>
        <dt><code>msg.timer</code> <span class="property-type">object</span></dt>
        <dd>{ hours, minutes, seconds } — only present in Timer mode</dd>
    </dl>
</script>

<script type="text/javascript">
    RED.nodes.registerType("quietcool-sensor", {
        category: "QuietCool",
        defaults: {
            name: { value: "" },
            fan: { value: "", type: "quietcool-config", required: true },
            query: { value: "get_state" },
        },
        color: "#80CBC4",
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-thermometer-half",
        paletteLabel: "fan sensor",
        label: function () {
            if (this.name) return this.name;
            var labels = {
                get_state: "Fan State",
                get_status: "Full Status",
            };
            return labels[this.query] || "Fan Sensor";
        },
    });
</script>
